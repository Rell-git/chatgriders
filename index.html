<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatgrid</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#07070e">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-mark">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
        <rect x="1" y="1" width="9.5" height="9.5" rx="2"/>
        <rect x="13.5" y="1" width="9.5" height="9.5" rx="2"/>
        <rect x="1" y="13.5" width="9.5" height="9.5" rx="2"/>
        <path d="M13.5 13.5h9.5v6.5a1.5 1.5 0 01-1.5 1.5H17l-2.5 2.5V21.5h-.5a1.5 1.5 0 01-1.5-1.5v-5a1.5 1.5 0 011.5-1.5z"/>
      </svg>
    </div>
    <h1>Chatgrid</h1>
    <p>Connect with anyone</p>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <!-- STEP A: Email + Password -->
  <div class="step active" data-step="A">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign In</button>
      <button class="auth-tab" data-tab="register">Register</button>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="eye-btn" onclick="togglePw('login-password',this)" tabindex="-1">
            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <form id="register-form" style="display:none">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="reg-password" placeholder="Min 6 chars + 1 uppercase" required minlength="6">
          <button type="button" class="eye-btn" onclick="togglePw('reg-password',this)" tabindex="-1">
            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div class="pw-hint">Needs at least one uppercase letter (A–Z)</div>
      </div>
      <button type="submit" class="btn">Continue →</button>
    </form>
  </div>

  <!-- STEP B: Avatar + Profile -->
  <div class="step" data-step="B">
    <div class="step-header">
      <h2>Set Up Your Profile</h2>
      <p>Pick an avatar and enter your name</p>
    </div>

    <form id="profile-form">
      <div class="avatar-preview-wrap">
        <img id="avatar-preview" src="" alt="avatar">
      </div>
      <div class="avatar-grid" id="avatar-grid"></div>

      <div class="form-group">
        <label>Name *</label>
        <input type="text" id="prof-name" placeholder="e.g. Juan" required maxlength="40">
      </div>
      <div class="form-group">
        <label>Middle Name <span class="optional">(optional)</span></label>
        <input type="text" id="prof-middle" placeholder="Optional" maxlength="40">
      </div>
      <div class="form-group">
        <label>Surname <span class="optional">(optional)</span></label>
        <input type="text" id="prof-surname" placeholder="Optional" maxlength="40">
      </div>

      <button type="submit" class="btn">Start Chatting ✦</button>
    </form>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
