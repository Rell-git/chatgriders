<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulseship</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d1a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-mark">
      <!-- Heartbeat logo -->
      <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
        <path d="M20 34s-14-9-14-19a8 8 0 0116 0 8 8 0 0116 0c0 10-18 19-18 19z" fill="white" opacity=".95"/>
        <polyline points="4,20 8,20 11,14 14,26 17,18 20,22 23,20 36,20" stroke="rgba(255,100,150,.9)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Pulseship</h1>
    <p>Find your connection</p>
  </div>

  <!-- Light/Dark toggle -->
  <div class="auth-theme-row">
    <span>🌙</span>
    <label class="toggle-switch">
      <input type="checkbox" id="auth-theme-toggle" onchange="toggleTheme(this)">
      <div class="tgl-track"></div>
    </label>
    <span>☀️</span>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <!-- STEP A -->
  <div class="step active" data-step="A">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign In</button>
      <button class="auth-tab" data-tab="register">Register</button>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="login-password" placeholder="••••••••" required>
          <button type="button" class="eye-btn" onclick="togglePw('login-password',this)" tabindex="-1">
            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <form id="register-form" style="display:none">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="reg-password" placeholder="Min 6 + 1 uppercase" required minlength="6">
          <button type="button" class="eye-btn" onclick="togglePw('reg-password',this)" tabindex="-1">
            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div class="pw-hint">At least one uppercase letter (A–Z)</div>
      </div>
      <button type="submit" class="btn">Continue →</button>
    </form>
  </div>

  <!-- STEP B: Avatar + Profile -->
  <div class="step" data-step="B">
    <div class="step-header">
      <h2>Your Profile</h2>
      <p>Upload a photo or pick an avatar</p>
    </div>
    <form id="profile-form">
      <div class="photo-upload-group">
        <label class="photo-upload-ring" title="Upload photo">
          <input type="file" id="photo-file-reg" accept="image/*" style="display:none" onchange="previewRegPhoto(this)">
          <img id="avatar-preview" src="" alt="">
          <div class="photo-upload-overlay">📷</div>
        </label>
      </div>
      <div class="avatar-grid" id="avatar-grid"></div>

      <div class="form-group">
        <label>First Name *</label>
        <input type="text" id="prof-name" placeholder="e.g. Juan" required maxlength="40">
      </div>
      <div class="form-group">
        <label>Middle Name <span class="optional">(optional)</span></label>
        <input type="text" id="prof-middle" placeholder="Optional" maxlength="40">
      </div>
      <div class="form-group">
        <label>Surname *</label>
        <input type="text" id="prof-surname" placeholder="e.g. dela Cruz" required maxlength="40">
      </div>
      <button type="submit" class="btn">Start ✦</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
